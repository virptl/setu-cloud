<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setu Admin — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    :root {
      --setu-accent: #ff6b35;
      --bg-dark: #07080d;
      --card-dark: #121422;
      --border-dark: #202336;
    }
    body {
      background: var(--bg-dark);
      color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--card-dark);
      border: 1px solid var(--border-dark);
      border-radius: 1.5rem;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
      color: #f8fafc;
    }
    .brand {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .brand span { color: var(--setu-accent); }
    .sub { color: #94a3b8; font-size: .875rem; }
    .form-control {
      background: var(--bg-dark);
      border: 1px solid var(--border-dark);
      color: #fff;
    }
    .form-control::placeholder {
      color: #64748b;
    }
    .form-control:focus {
      background: var(--bg-dark);
      color: #fff;
      border-color: var(--setu-accent);
      box-shadow: 0 0 15px rgba(255, 107, 53, 0.25);
    }
    .btn-login {
      background: var(--setu-accent);
      border: none;
      color: #fff;
      font-weight: 700;
      padding: .75rem;
      border-radius: 0.75rem;
      transition: all 0.2s ease;
    }
    .btn-login:hover {
      background: #e85c28;
      color: #fff;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="login-card card p-4 p-sm-5">
    <div class="text-center mb-4">
      <img src="/setu-mark-white.png" alt="Setu Logo" style="height: 48px;" class="mb-3">
      <div class="brand"><span>setu</span> admin</div>
      <div class="sub mt-1">Device Inventory Management</div>
    </div>

    <div id="error-alert" class="alert alert-danger py-2 small d-none">
      <strong>Invalid username or password.</strong> Please try again.
    </div>

    <form method="POST" action="/login">
      <div class="mb-3">
        <label class="form-label small fw-semibold">Username</label>
        <input type="text" name="username" class="form-control" required
               autofocus autocomplete="username" placeholder="admin">
      </div>
      <div class="mb-4">
        <label class="form-label small fw-semibold">Password</label>
        <input type="password" name="password" class="form-control" required
               autocomplete="current-password" placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-login w-100">Sign in</button>
    </form>
  </div>

  <script>
    // Show error banner if redirected back with ?error=1
    if (new URLSearchParams(location.search).get('error') === '1') {
      document.getElementById('error-alert').classList.remove('d-none');
    }
  </script>
</body>
</html>
